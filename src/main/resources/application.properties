spring.application.name=protocologus

# =========================
# H2 - Reto 3 SQL detective
# =========================

# Base H2 en fichero dentro del proyecto/ejecuci\u00f3n
spring.datasource.url=jdbc:h2:file:./data/protocolo_gus_reto3;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Inicializaci\u00f3n SQL autom\u00e1tica
spring.sql.init.mode=always

# Consola H2 solo para desarrollo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Evita que Hibernate toque el esquema si no est\u00e1s usando JPA para esto
spring.jpa.hibernate.ddl-auto=none
